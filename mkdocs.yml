site_name: Linear Algebra Done Right 4th edition
theme: readthedocs

nav:
  - Home: index.md
  - Chapter 01 Notes: ch01notes.md
  - Chapter 01 Exercises: ch01ex.md
  - Chapter 02 Notes: ch02notes.md
  - Chapter 02 Exercises: ch02ex.md
  - Chapter 03 Notes: ch03notes.md
  - Chapter 03 Exercises: ch03ex.md
  - unsolved: unsolved.md

# Order matters: config must run before the MathJax bundle.
extra_javascript:
  - javascripts/mathjax-config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js

markdown_extensions:
    - mdx_math:
        enable_dollar_delimiter: True

repo_name: Github
repo_url: https://github.com/eroicaleo/liner-algebra-done-right-4th/
edit_uri: 'blob/main/docs/'
